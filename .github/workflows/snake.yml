name: generate animation

on:
  schedule:
    - cron: "0 */24 * * *" 
  workflow_dispatch: {}      
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#ff69b4&color_dots=#1a1a2e,#39136e,#7209b7,#b5179e,#ff69b4
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ff69b4&color_dots=#0d1117,#39136e,#7209b7,#b5179e,#ff69b4

      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}